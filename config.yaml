# ---- data collection -------------------------------------------------------
format: gen9ou          # Showdown format id (gen9ou, gen9randombattle, ...)
min_rating: 1300        # scrape floor; raised from 1100 (2026-07) for dataset v2
pages_per_run: 2        # 51 replays/page; raise for full collection runs (40 ≈ 2k games)
request_delay_s: 1.0    # polite rate limit for replay.pokemonshowdown.com

# ---- modeling ----------------------------------------------------------------
test_split_date: "2026-07-01"   # games uploaded on/after this date form the test set
train_min_rating: 1300          # older low-elo games stay on disk (skill-band analysis)
                                # but are excluded from model training

# ---- smogon usage stats (Phase 3/5 features) --------------------------------
stats_month: "2026-06"
stats_baseline: 1500    # rating cutoff of the stats file (0/1500/1695/1825); 1500 ≈ our 1300+ corpus

# ---- paths (relative to repo root) ------------------------------------------
paths:
  raw_replays: data/raw/replays
  raw_stats: data/raw/stats
  processed: data/processed
